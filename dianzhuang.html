        * {

            margin: 0;
            padding: 0;
        }

            padding: 12px 12px 30px;
            min-height: 100vh;
        }
        .container {
            max-width: 560px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 28px;

            border: 1px solid rgba(0,20,40,0.03);
        }
        h2 {
            font-size: 1.9rem;
            font-weight: 550;
            letter-spacing: -0.3px;
            color: #0b2b40;
            text-align: center;
            margin: 5px 0 5px;
        }
        .subhead {
            text-align: center;
            color: #64748b;
            font-size: 0.9rem;
            border-bottom: 1px solid #e9eef2;
            padding-bottom: 15px;
            margin-bottom: 10px;
        }
        .form-item {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 530;
            color: #1e3a5f;
            font-size: 0.95rem;
        }
        input, select {
            width: 100%;
            padding: 15px 18px;
            border: 1.5px solid #e2e8f0;
            border-radius: 24px;
            font-size: 1rem;
            background: #fafdff;
            transition: 0.2s;
            -webkit-appearance: none;
            appearance: none;
        }
        input:focus, select:focus {
            border-color: #3b82f6;
            outline: none;
            background: white;
            box-shadow: 0 0 0 5px rgba(59,130,246,0.1);
        }
        input[readonly] {
            background: #f1f5f9;
            color: #0b2b40;
            font-weight: 500;
            border-color: #d1d9e6;
        }
        .scan-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .scan-row input {
            flex: 1;
            border-radius: 24px;
        }
        .scan-row button {
            flex: 0 0 90px;
            padding: 15px 0;
            font-size: 1rem;
            border-radius: 40px;
            background: #2ecc71;
            border: none;
            color: white;
            font-weight: 600;
            box-shadow: 0 6px 12px rgba(46,204,113,0.3);
            cursor: pointer;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 16px 0 6px;
        }
        .btn-group button {
            flex: 1 1 0;
            padding: 14px 8px;
            border: none;
            border-radius: 40px;
            font-size: 0.98rem;
            font-weight: 550;
            color: white;
            background: #3498db;
            box-shadow: 0 6px 14px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: 0.1s ease;
            min-width: 110px;
        }
        .btn-group button:active { transform: scale(0.96); opacity: 0.8; }
        #scanBtn { background: #2ecc71; }
        #photoBtn { background: #f39c12; }      /* 相册选取 */
        #cameraBtn { background: #9b59b6; }      /* 现场拍照 */
        #saveBtn { background: #3498db; }
        #exportBtn { background: #1abc9c; }
        #clearBtn { background: #e74c3c; }

        #photoPreview {
            margin-top: 15px;
            display: none;
            background: #f0f6fa;
            border-radius: 26px;
            padding: 18px;
            border: 1px solid #bdd3e8;
        }
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .remove-photo {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            box-shadow: none;
        }
        #previewImg {
            max-width: 100%;
            max-height: 190px;
            border-radius: 24px;
            display: block;
            margin: 0 auto;
            box-shadow: 0 8px 18px rgba(0,0,0,0.1);
        }

        .scan-modal {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 10000;
            backdrop-filter: blur(5px);
        }
        .scan-modal.show { display: flex; }
        #scanVideo {
            width: 85%;
            max-width: 420px;
            border-radius: 36px;
            border: 4px solid #2ecc71;
            box-shadow: 0 25px 45px rgba(0,255,0,0.2);
            background: black;
        }
        .close-scan {
            position: absolute;
            top: 35px; right: 25px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 48px;
            width: 70px; height:70px;
            border-radius: 40px;
            line-height: 70px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .scan-tips {
            color: #ccc;
            margin-top: 25px;
            background: rgba(0,0,0,0.5);
            padding: 14px 30px;
            border-radius: 60px;
        }

        .record-header {
            display: flex; justify-content: space-between; align-items: baseline;
            margin-bottom: 15px;
        }
        .record-header h3 { font-size: 1.4rem; font-weight: 540; color: #0b2b40; }
        .badge { background: #dbeafe; padding: 6px 16px; border-radius: 40px; color: #1e40af; font-weight: 500; }
        .record-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .record-item {
            background: #f9fcff;
            border-radius: 24px;
            padding: 16px 18px;
            border: 1px solid #e2edf5;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .record-info { flex:1; }
        .record-info .pile { font-weight: 650; color: #1e3a8a; font-size: 1.03rem; }
        .record-info .meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; color: #36454F; }
        .record-info .meta span { background: #eef2f6; padding: 4px 14px; border-radius: 40px; font-size: 0.85rem; }
        .record-thumb {
            width: 56px; height:56px; border-radius: 18px; object-fit: cover;
            margin-left: 12px; background: #cbd5e1; border: 2px solid white; box-shadow: 0 3px 10px rgba(0,0,0,0.1);

        .delete-record {
            background: #f1f5f9; color: #b91c1c; border: none; font-size: 1.2rem;
            padding: 8px 14px; border-radius: 36px; margin-left: 12px; font-weight: bold;
            box-shadow: none; min-width: auto;
        }
        .empty-records { text-align: center; color: #94a3b8; padding: 30px 0; background: #f8fafc; border-radius: 30px; }
        footer { text-align: center; color: #99aec6; font-size: 0.8rem; margin-top: 20px; }
        .note { font-size:0.85rem; color:#6b7c93; margin-top: 5px; }
    </style>
</head>

<div class="container">
    <div class="card" style="padding: 16px 18px;">
        <h2>⚡充电桩巡检</h2>
        <div class="subhead">手动输入 · 拍照分离 · 图片表格导出</div>
    </div>

    <div class="card">
        <!-- 扫码 + 手动输入行 -->
        <div class="form-item">
            <label>🔍 充电桩编号 (可手动/扫码)</label>
            <div class="scan-row">
                <input type="text" id="pileNo" placeholder="HK6050202312140144" value="">
                <button id="scanBtn">扫码</button>
            </div>
        </div>
        <div class="form-item">
            <label>📍 站点名称</label>
            <input type="text" id="stationName" placeholder="自动匹配或手动填写">
        </div>
        <div class="form-item">
            <label>🔧 设备状态</label>
            <select id="status">
                <option value="">请选择</option>
                <option value="正常">正常</option>
                <option value="异常">异常</option>
            </select>
        </div>
        <div class="form-item">
            <label>📝 问题描述</label>
            <input type="text" id="desc" placeholder="无则填无">
        </div>

        <!-- 两个拍照按钮分开: 相册选取 / 现场拍照 -->
        <div class="btn-group" style="margin-top: 8px;">
            <button id="photoBtn">🖼️ 相册选取</button>
            <button id="cameraBtn">📸 现场拍照</button>
        </div>
        <!-- 隐藏的file input分别对应相册和相机 -->
        <input type="file" id="galleryInput" accept="image/*" style="display:none;">
        <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">

        <!-- 照片预览区 -->
        <div id="photoPreview">
            <div class="preview-header">
                <span style="font-weight:500;">已选照片</span>
                <button class="remove-photo" id="removePhotoBtn">✕ 移除</button>
            </div>
            <img id="previewImg" alt="预览图">
        </div>

        <!-- 操作按钮 -->
        <div class="btn-group">
            <button id="saveBtn">💾 保存记录</button>
            <button id="exportBtn">📤 导出HTML表格</button>
            <button id="clearBtn">🗑️ 清空全部</button>
        </div>
        <div class="note">导出为HTML文件，图片内嵌，可用浏览器打开</div>
    </div>

    <!-- 记录列表卡片 -->
    <div class="card">
        <div class="record-header">
            <h3>📋 已巡检记录</h3>
            <span class="badge" id="recordCount">0</span>
        </div>
        <div id="recordListContainer">
            <ul class="record-list" id="recordList">
                <li class="empty-records">暂无记录，扫码或手动添加</li>
            </ul>
        </div>
    </div>
    <footer>增强版 · 图片本地存储 · 导出含图HTML</footer>
</div>

<!-- 扫码模态框 -->
<div class="scan-modal" id="scanModal">
    <video id="scanVideo" autoplay playsinline muted></video>
    <button class="close-scan" id="closeScanBtn">×</button>
    <div class="scan-tips">对准二维码 (HK/WH开头) 自动识别</div>
</div>

    // ---------- 构建标准化Map (去除空格+大写) ----------
    const pileMap = new Map();
    Object.entries(rawPileData).forEach(([key, value]) => {
        const normalized = key.replace(/\s+/g, '').toUpperCase();
        pileMap.set(normalized, value.station);
    });

    // ---------- 全局变量 ----------
    let mediaStream = null;
    let scanInterval = null;
    let currentImageBase64 = '';      // 存储压缩后的图片

    // ---------- 工具函数 ----------
    function getRecords() {
        try { return JSON.parse(localStorage.getItem('charge_records') || '[]'); } catch { return []; }
    }
    function saveRecords(records) {
        localStorage.setItem('charge_records', JSON.stringify(records));
        renderRecords();
    }
    function addRecord(record) {
        const records = getRecords();
        records.push(record);
        saveRecords(records);
    }
    function deleteRecord(index) {
        const records = getRecords();
        records.splice(index, 1);
        saveRecords(records);
    }

    // 图片压缩
    function compressImage(file, maxWidth = 400, quality = 0.75) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    let width = img.width, height = img.height;
                    if (width > maxWidth) {
                        height *= maxWidth / width;
                        width = maxWidth;
                    }
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
                img.onerror = reject;
                img.src = e.target.result;
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    // 渲染记录列表
    function renderRecords() {
        const records = getRecords();
        const listEl = document.getElementById('recordList');
        const countEl = document.getElementById('recordCount');
        countEl.innerText = records.length;
        if (!records.length) {
            listEl.innerHTML = '<li class="empty-records">暂无记录，扫码或手动添加</li>';
            return;
        }
        let html = '';
        records.forEach((r, index) => {
            const hasImage = r.image && r.image.length > 200;
            html += `
                <li class="record-item">
                    <div class="record-info">
                        <div class="pile">${escapeHtml(r.pileNo || '--')}</div>
                        <div class="meta">
                            <span>${escapeHtml(r.station || '未知')}</span>
                            <span>${escapeHtml(r.status || '无')}</span>
                            <span>${escapeHtml(r.time || '')}</span>
                        </div>
                        ${r.desc ? `<div style="font-size:0.85rem; color:#4b5563;">📌 ${escapeHtml(r.desc)}</div>` : ''}
                    </div>
                    ${hasImage ? `<img class="record-thumb" src="${r.image}" alt="现场照">` : '<div class="record-thumb" style="background:#e9ecf0;"></div>'}
                    <button class="delete-record" data-index="${index}">✕</button>
                </li>
            `;
        });
        listEl.innerHTML = html;
        document.querySelectorAll('.delete-record').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                deleteRecord(parseInt(btn.dataset.index));
            });
        });
    }
    // 简单防XSS
    function escapeHtml(unsafe) {
        return String(unsafe).replace(/[&<>"]/g, function(m) {
            if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; if(m === '"') return '&quot;';
            return m;
        });
    }

    // 匹配站点：根据输入框编号自动填充站点名称
    function matchStationFromPileNo(pileNo) {
        if (!pileNo) return '';
        const normalized = pileNo.replace(/\s+/g, '').toUpperCase();
        return pileMap.get(normalized) || '';   // 没找到返回空字符串
    }

    // 监听编号输入框手动匹配（失去焦点时）
    document.getElementById('pileNo').addEventListener('blur', function(e) {
        const pile = e.target.value.trim();
        if (pile) {
            const station = matchStationFromPileNo(pile);
            if (station) {
                document.getElementById('stationName').value = station;
            } else {
                // 不清空已有手动输入，可提示但不用强求
            }
        }
    });

    // ---------- 拍照与相册 ----------
    const galleryInput = document.getElementById('galleryInput');
    const cameraInput = document.getElementById('cameraInput');

    async function handleImageSelected(file) {
        if (!file) return;
        try {
            const base64 = await compressImage(file, 400, 0.75);
            currentImageBase64 = base64;
            document.getElementById('previewImg').src = base64;
            document.getElementById('photoPreview').style.display = 'block';
        } catch (err) {
            alert('图片处理失败');
        }
    }

    galleryInput.addEventListener('change', (e) => {
        if (e.target.files[0]) handleImageSelected(e.target.files[0]);
        e.target.value = ''; // 允许重复选同一文件
    });
    cameraInput.addEventListener('change', (e) => {
        if (e.target.files[0]) handleImageSelected(e.target.files[0]);
        e.target.value = '';
    });

    document.getElementById('photoBtn').addEventListener('click', () => {
        galleryInput.click();   // 相册选取
    });
    document.getElementById('cameraBtn').addEventListener('click', () => {
        cameraInput.click();    // 现场拍照
    });

    document.getElementById('removePhotoBtn').addEventListener('click', () => {
        currentImageBase64 = '';
        document.getElementById('photoPreview').style.display = 'none';
        document.getElementById('previewImg').src = '';
    });

    // ---------- 扫码功能 ----------
    function extractPileNo(raw) {
        const match = String(raw).match(/(hk|wh)[0-9a-zA-Z]+/i);
        return match ? match[0].toUpperCase() : '';
    }

    document.getElementById('scanBtn').onclick = async function() {
        document.getElementById('scanModal').classList.add('show');
        try {
            mediaStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            const video = document.getElementById('scanVideo');
            video.srcObject = mediaStream;
            await video.play();
            startScan();
        } catch(e) {
            alert('无法开启摄像头，请检查权限');
            closeScan();
        }
    };

    function closeScan() {
        document.getElementById('scanModal').classList.remove('show');
        if (scanInterval) { clearInterval(scanInterval); scanInterval = null; }
        if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
    }
    document.getElementById('closeScanBtn').onclick = closeScan;

    function startScan() {
        const video = document.getElementById('scanVideo');
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        if (scanInterval) clearInterval(scanInterval);
        scanInterval = setInterval(() => {
            if (!mediaStream || !video.videoWidth) return;
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, canvas.width, canvas.height);
                if (code) {
                    const raw = code.data;
                    const pileNo = extractPileNo(raw);
                    if (pileNo) {
                        document.getElementById('pileNo').value = pileNo;
                        const station = matchStationFromPileNo(pileNo) || '未匹配到站点';
                        document.getElementById('stationName').value = station;
                        alert(`✅ 识别成功: ${pileNo}`);
                        closeScan();
                    } else {
                        alert('二维码中未找到HK/WH开头的编号');
                        // 不关闭，可继续扫描
                    }
                }
            }
        }, 350);
    }

    // ---------- 保存记录 ----------
    document.getElementById('saveBtn').addEventListener('click', () => {
        const pileNo = document.getElementById('pileNo').value.trim();
        const station = document.getElementById('stationName').value.trim() || '未知站点';
        const status = document.getElementById('status').value;
        const desc = document.getElementById('desc').value.trim() || '无';
        const time = new Date().toLocaleString('zh-CN');

        if (!pileNo) return alert('请填写或扫码获取充电桩编号');
        if (!status) return alert('请选择设备状态');

        const record = { pileNo, station, status, desc, time, image: currentImageBase64 };
        addRecord(record);

        // 清空非必要字段，保留编号和站点（方便连续录入同一站点）
        document.getElementById('status').value = '';
        document.getElementById('desc').value = '';
        currentImageBase64 = '';
        document.getElementById('photoPreview').style.display = 'none';
        document.getElementById('previewImg').src = '';
    });

    // ---------- 导出HTML表格（包含图片）----------
    document.getElementById('exportBtn').addEventListener('click', () => {
        const records = getRecords();
        if (!records.length) return alert('无记录可导出');
        let tableRows = '';
        records.forEach((r, idx) => {
            const imageCell = r.image ? `<img src="${r.image}" style="max-width:150px; max-height:120px; border-radius:12px;">` : '无照片';
            tableRows += `<tr>
                <td>${idx+1}</td>
                <td>${escapeHtml(r.pileNo)}</td>
                <td>${escapeHtml(r.station)}</td>
                <td>${escapeHtml(r.status)}</td>
                <td>${escapeHtml(r.desc)}</td>
                <td>${escapeHtml(r.time)}</td>
                <td>${imageCell}</td>
            </tr>`;
        });
        const htmlContent = `<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>充电桩巡检记录</title>
<style>body{font-family:system-ui;padding:20px;background:#f5f7fa;}table{border-collapse:collapse;width:100%;background:white;border-radius:20px;overflow:hidden;box-shadow:0 12px 30px rgba(0,0,0,0.05);}th{background:#1e3a5f;color:white;padding:14px;}td,th{padding:12px;border-bottom:1px solid #dde7f0;text-align:left;}img{border-radius:12px;box-shadow:0 2px 6px black;}</style>
</head>
<body><h2>⚡充电桩巡检记录表 (含图片)</h2>
<table><thead><tr><th>#</th><th>编号</th><th>站点</th><th>状态</th><th>问题</th><th>时间</th><th>照片</th></tr></thead><tbody>${tableRows}</tbody></table>
<p>导出时间: ${new Date().toLocaleString()}</p></body></html>`;

        const blob = new Blob([htmlContent], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `充电桩巡检_${new Date().toLocaleDateString()}.html`;
        a.click();
        URL.revokeObjectURL(url);
    });

    // 清空全部
    document.getElementById('clearBtn').addEventListener('click', () => {
        if (confirm('⚠️ 确定清空所有巡检记录？不可恢复')) {
            localStorage.removeItem('charge_records');
            renderRecords();
        }
    });

    // 初始渲染
    renderRecords();
})();
