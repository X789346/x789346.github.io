        // 扫码功能
        document.getElementById('scanBtn').addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const scan = () => {
                    if (video.readyState === video.HAVE_ENOUGH_DATA) {
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const code = jsQR(imageData.data, canvas.width, canvas.height);
                        
                        if (code) {
                            let pileNo = code.data;
                            // 如果二维码是链接，提取编号（请根据你的实际情况调整）
                            if (pileNo.includes('no=')) {
                                pileNo = pileNo.split('no=')[1].split('&')[0];
                            }
                            document.getElementById('pileNo').value = pileNo;
                            
                            if (pileData[pileNo]) {
                                document.getElementById('stationName').value = pileData[pileNo].station;
                                document.getElementById('dealer').value = pileData[pileNo].dealer;
                            } else {
                                alert('未找到该充电桩信息！');
                            }
                            stream.getTracks().forEach(track => track.stop());
                        } else {
                            requestAnimationFrame(scan);
                        }
                    } else {
                        requestAnimationFrame(scan);
                    }
                };
                requestAnimationFrame(scan);
            } catch (err) {
                alert('请允许摄像头权限！');
            }
        });

        // 保存记录到WPS表格
        document.getElementById('saveBtn').addEventListener('click', async () => {
            const pileNo = document.getElementById('pileNo').value;
            const station = document.getElementById('stationName').value;
            const dealer = document.getElementById('dealer').value;
            const status = document.getElementById('status').value;
            const desc = document.getElementById('desc').value;
            const time = new Date().toLocaleString();

            if (!pileNo || !status) {
                alert('请先扫码并选择设备状态！');
                return;
            }

            try {
                // 1. 获取Access Token
                const tokenResponse = await fetch('https://openapi.wps.cn/oauth/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `grant_type=client_credentials&client_id=${WPS_CONFIG.APP_ID}&client_secret=${WPS_CONFIG.APP_KEY}`
                });
                const tokenData = await tokenResponse.json();
                if (!tokenData.access_token) {
                    throw new Error('获取Token失败: ' + JSON.stringify(tokenData));
                }
                const accessToken = tokenData.access_token;

                // 2. 追加数据到表格
                const appendResponse = await fetch(`https://openapi.wps.cn/table/v1/tables/${WPS_CONFIG.TABLE_ID}/sheets/${WPS_CONFIG.SHEET_NAME}/append`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        values: [[pileNo, station, dealer, status, desc, time]]
                    })
                });

                const result = await appendResponse.json();
                if (appendResponse.ok) {
                    alert('记录已成功保存到WPS表格！');
                    document.getElementById('status').value = '';
                    document.getElementById('desc').value = '';
                } else {
                    throw new Error(`保存失败: ${result.message || '未知错误'}`);
                }
            } catch (error) {
                console.error('保存错误:', error);
                alert(`保存失败：${error.message}`);
            }
