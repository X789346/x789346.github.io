            height: 100%;

            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

            display: flex;
        }
        .scan-header {
            color: white;
            font-size: 18px;
            margin-bottom: 10px;
            text-align: center;
        }
        .scan-container {
            position: relative;
            width: 90%;
            max-width: 400px;
            height: 0;
            padding-bottom: 100%; /* 正方形预览框 */
            margin: 0 auto;
        }
        /* 扫码框（带定位辅助线） */
        .scan-box {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 2px solid #00ff00;
            box-sizing: border-box;
            border-radius: 10px;
            overflow: hidden;
        }
        /* 摄像头视频流 */
        #scanVideo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* 镜像显示，符合拍摄习惯 */
        }
        /* 扫码辅助线 */
        .scan-line {
            position: absolute;
            top: 50%;
            left: 10%;
            width: 80%;
            height: 2px;
            background: #00ff00;
            animation: scanMove 2s infinite linear;
        }
        @keyframes scanMove {
            0% { top: 10%; }
            50% { top: 90%; }
            100% { top: 10%; }
        }
        /* 关闭按钮 */
        .close-scan {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
            border: none;
            padding: 0;
        }

        }
        .scan-tips {

            font-size: 14px;
            margin-top: 15px;

        });

        // ========== 新增：关闭扫码弹窗 ==========
        document.getElementById('closeScanBtn').addEventListener('click', closeScanModal);

        // 关闭扫码弹窗并停止摄像头
        function closeScanModal() {
            // 隐藏弹窗
            document.getElementById('scanModal').classList.remove('show');
            
            // 停止摄像头流
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
            
            // 停止扫码动画
            if (scanAnimation) {
                cancelAnimationFrame(scanAnimation);
                scanAnimation = null;
            }
        }

        // ========== 核心：扫码识别逻辑（带预览） ==========
        function startScan() {
            const videoElement = document.getElementById('scanVideo');
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            const scan = () => {
                if (videoElement.readyState === videoElement.HAVE_ENOUGH_DATA && mediaStream) {
                    canvas.width = videoElement.videoWidth;
                    canvas.height = videoElement.videoHeight;
                    ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const code = jsQR(imageData.data, canvas.width, canvas.height);
                    
                    if (code) {
                        let scanResult = code.data.trim();
                        let pileNo = '';

                        // 提取充电桩编号
                        const pileRegex = /(WH|HK)\w+/g;
                        const matchResult = scanResult.match(pileRegex);
                        if (matchResult && matchResult.length > 0) {
                            pileNo = matchResult[0];
                        } else if (scanResult.startsWith('WH') || scanResult.startsWith('HK')) {
                            pileNo = scanResult;
                        }

                        // 填充数据
                        if (pileNo) {
                            document.getElementById('pileNo').value = pileNo;
                            if (pileData[pileNo]) {
                                document.getElementById('stationName').value = pileData[pileNo].station;
                                document.getElementById('dealer').value = pileData[pileNo].dealer;
                                alert(`✅ 识别成功：${pileNo}`);
                            } else {
                                alert(`⚠️ 未找到编号【${pileNo}】的充电桩信息！`);
                            }
                        } else {
                            alert('❌ 未识别到充电桩编号，请重新扫码！');
                        }
                        
                        // 识别完成后关闭弹窗
                        closeScanModal();
                        return;
                    }
                }
                
                // 继续扫描
                scanAnimation = requestAnimationFrame(scan);
            };
            
            scanAnimation = requestAnimationFrame(scan);
        }

        // 保存记录到WPS表格
        document.getElementById('saveBtn').addEventListener('click', async () => {
            const pileNo = document.getElementById('pileNo').value.trim();
            const station = document.getElementById('stationName').value.trim();
            const dealer = document.getElementById('dealer').value.trim();
            const status = document.getElementById('status').value.trim();
            const desc = document.getElementById('desc').value.trim() || '无';
            const time = new Date().toLocaleString('zh-CN');

            if (!pileNo) {
                alert('请先扫码获取充电桩编号！');
                return;
            }
            if (!status) {
                alert('请选择设备状态！');
                return;
            }

            try {
                const tokenResponse = await fetch('https://openapi.wps.cn/oauth/token', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/x-www-form-urlencoded; charset=utf-8',
                        'Accept': 'application/json'
                    },
                    body: `grant_type=client_credentials&client_id=${encodeURIComponent(WPS_CONFIG.APP_ID)}&client_secret=${encodeURIComponent(WPS_CONFIG.APP_KEY)}`
                });
                
                if (!tokenResponse.ok) {
                    throw new Error(`Token请求失败: ${tokenResponse.status} ${tokenResponse.statusText}`);
                }
                
                const tokenData = await tokenResponse.json();
                if (!tokenData.access_token) {
                    throw new Error('获取Token失败: ' + (tokenData.error || '未知错误'));
                }
                const accessToken = tokenData.access_token;

                const appendResponse = await fetch(`https://openapi.wps.cn/table/v1/tables/${encodeURIComponent(WPS_CONFIG.TABLE_ID)}/sheets/${encodeURIComponent(WPS_CONFIG.SHEET_NAME)}/append`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json; charset=utf-8',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        values: [[pileNo, station, dealer, status, desc, time]]
                    })
                });

                const result = await appendResponse.json();
                if (appendResponse.ok) {
                    alert('✅ 记录已成功保存到WPS表格！');
                    document.getElementById('status').value = '';
                    document.getElementById('desc').value = '';
                } else {
                    throw new Error(`保存失败: ${result.message || '未知错误'}`);
                }
            } catch (error) {
                console.error('保存错误:', error);
                alert(`❌ 保存失败：${error.message}`);
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            document.characterSet = 'UTF-8';
            document.charset = 'UTF-8';
        });
    </script>
</body>
