        // 扫码功能（优化兼容性）
        document.getElementById('scanBtn').addEventListener('click', async () => {
            try {
                // 兼容不同浏览器的媒体设备API
                const navigatorMedia = navigator.mediaDevices || ((navigator.mozGetUserMedia || navigator.webkitGetUserMedia) ? {
                    getUserMedia: function(c) {
                        return new Promise(function(y, n) {
                            (navigator.mozGetUserMedia || navigator.webkitGetUserMedia).call(navigator, c, y, n);
                        });
                    }
                } : null);

                if (!navigatorMedia) {
                    alert('你的浏览器不支持摄像头功能，请使用Chrome/Edge/微信浏览器！');
                    return;
                }

                const stream = await navigatorMedia.getUserMedia({ 
                    video: { 
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    } 
                });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                const scan = () => {
                    if (video.readyState === video.HAVE_ENOUGH_DATA) {
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const code = jsQR(imageData.data, canvas.width, canvas.height);
                        
                        if (code) {
                            let pileNo = code.data.trim();
                            // 兼容不同格式的二维码内容
                            if (pileNo.includes('no=')) {
                                pileNo = pileNo.split('no=')[1].split('&')[0];
                            }
                            document.getElementById('pileNo').value = pileNo;
                            
                            if (pileData[pileNo]) {
                                document.getElementById('stationName').value = pileData[pileNo].station;
                                document.getElementById('dealer').value = pileData[pileNo].dealer;
                            } else {
                                alert('未找到该充电桩信息！');
                            }
                            // 停止摄像头流
                            stream.getTracks().forEach(track => track.stop());
                        } else {
                            requestAnimationFrame(scan);
                        }
                    } else {
                        requestAnimationFrame(scan);
                    }
                };
                requestAnimationFrame(scan);
            } catch (err) {
                console.error('扫码错误:', err);
                alert('请允许摄像头权限，或检查设备是否有摄像头！');
            }
        });

                return;
            }
            if (!status) {
                alert('请选择设备状态！');
                return;
            }

            try {
                // 1. 获取Access Token
                const tokenResponse = await fetch('https://openapi.wps.cn/oauth/token', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/x-www-form-urlencoded; charset=utf-8',
                        'Accept': 'application/json'
                    },
                    body: `grant_type=client_credentials&client_id=${encodeURIComponent(WPS_CONFIG.APP_ID)}&client_secret=${encodeURIComponent(WPS_CONFIG.APP_KEY)}`
                });
                
                if (!tokenResponse.ok) {
                    throw new Error(`Token请求失败: ${tokenResponse.status} ${tokenResponse.statusText}`);
                }
                
                const tokenData = await tokenResponse.json();
                if (!tokenData.access_token) {
                    throw new Error('获取Token失败: ' + (tokenData.error || '未知错误'));
                }
                const accessToken = tokenData.access_token;

                // 2. 追加数据到表格
                const appendResponse = await fetch(`https://openapi.wps.cn/table/v1/tables/${encodeURIComponent(WPS_CONFIG.TABLE_ID)}/sheets/${encodeURIComponent(WPS_CONFIG.SHEET_NAME)}/append`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json; charset=utf-8',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        values: [[pileNo, station, dealer, status, desc, time]]
                    })
                });

                const result = await appendResponse.json();
                if (appendResponse.ok) {
                    alert('✅ 记录已成功保存到WPS表格！');
                    // 重置表单（保留编号和站点信息，方便连续录入）
                    document.getElementById('status').value = '';
                    document.getElementById('desc').value = '';
                } else {
                    throw new Error(`保存失败: ${result.message || '未知错误'}`);
                }
            } catch (error) {
                console.error('保存错误:', error);
                alert(`❌ 保存失败：${error.message}`);
            }
        });

        // 页面加载完成后强制设置编码（最终保障）
        document.addEventListener('DOMContentLoaded', function() {
            document.characterSet = 'UTF-8';
            document.charset = 'UTF-8';
        });
    </script>
</body>
</html>
